<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Business Card</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #ar-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

  <!-- AR container -->
  <div id="ar-container"></div>

  <!-- MindAR (lokaali tiedosto!) -->
  <script src="libs/mindar.js"></script>

  <!-- TF fix -->
  <script>
    if (window.MINDAR && window.MINDAR.IMAGE) {
      window.tf = window.MINDAR.IMAGE.tf;
    } else {
      console.error("MindAR not loaded!");
    }
  </script>

  <!-- MAIN -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
